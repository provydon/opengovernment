[PHP]
; Memory: tight budget on 512MB containers
memory_limit = 128M
post_max_size = 50M
upload_max_filesize = 50M
variables_order = EGPCS

; Realpath cache — reduces stat() calls behind Octane
realpath_cache_size = 4M
realpath_cache_ttl = 600

[opcache]
opcache.enable=1
; 64MB is enough for ~10k files; was 256MB which could exceed container RAM
opcache.memory_consumption=64
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.validate_timestamps=0
; JIT disabled — FrankenPHP/Octane long-lived workers don't benefit much and it eats RAM
opcache.jit=0
opcache.jit_buffer_size=0
